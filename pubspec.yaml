name: messenger
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2
  
dependencies:
  flutter:
    sdk: flutter
    
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  ffi: ^2.2.0
  path_provider: ^2.1.6
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  intl: ^0.20.2
  # video_player: ^2.11.1
  # share_plus: ^13.1.0
  phosphoricons_flutter: ^1.0.0
  # disk_space_plus: ^0.2.6

  flutter_localizations:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  system_info2: ^4.1.0
  qr_code_scanner_plus: ^2.2.0
  camera: ^0.10.5+9
  permission_handler: ^12.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"

  adaptive_icon_foreground: "assets/app_icon.png"
  adaptive_icon_background: "#ffffff"

  remove_alpha_ios: true
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  
flutter:
  generate: true
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    
  fonts:
  - family: Lexend
    fonts:
      - asset: assets/fonts/Lexend-Thin.ttf
        weight: 100
      - asset: assets/fonts/Lexend-ExtraLight.ttf
        weight: 200
      - asset: assets/fonts/Lexend-Light.ttf
        weight: 300
      - asset: assets/fonts/Lexend-Regular.ttf
        weight: 400
      - asset: assets/fonts/Lexend-Medium.ttf
        weight: 500
      - asset: assets/fonts/Lexend-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Lexend-Bold.ttf
        weight: 700
      - asset: assets/fonts/Lexend-ExtraBold.ttf
        weight: 800
      - asset: assets/fonts/Lexend-Black.ttf
        weight: 900